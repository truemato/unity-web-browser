<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>P2-Goal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;background:#1a1a1a;overflow:hidden;font-family:sans-serif;position:relative}
.s{position:absolute;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#0f0;background:#333;border:4px solid #555;box-shadow:2px 2px 6px rgba(0,255,0,.15);text-decoration:none;cursor:default;user-select:none}
a.s{cursor:pointer}a.s:hover{background:#444;box-shadow:0 0 12px rgba(0,255,0,.3)}
.n{position:absolute;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#0f0;background:#2a2a2a;text-decoration:none;cursor:default}
a.n{cursor:pointer}a.n:hover{background:#3a3a3a;box-shadow:0 0 12px rgba(0,255,0,.3)}
.ban{position:absolute;top:10%;left:50%;transform:translateX(-50%);background:#0a0;color:#1a1a1a;padding:8px 24px;font-size:22px;font-weight:bold;border-radius:6px}
#cm{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;color:#0f0;z-index:200}
#ink{position:fixed;bottom:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;overflow:hidden}
.ink-drop{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(0,200,0,.9) 0%,rgba(0,100,0,.7) 40%,rgba(0,50,0,.3) 70%,transparent 100%);filter:blur(8px);animation:spread 4s ease-out infinite}
.ink-base{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(to top,rgba(0,180,0,.85),rgba(0,100,0,.5) 60%,transparent);transition:height .3s}
@keyframes spread{0%{transform:scale(.8);opacity:.9}50%{transform:scale(1.3);opacity:.6}100%{transform:scale(.8);opacity:.9}}
</style></head><body>
<div class="ban">ナツメ</div>
<a class="n" href="javascript:void(0)" id="clearBtn" style="top:28%;left:50%;transform:translateX(-50%)">5</a>
<div class="s" style="top:55%;right:15%">e</div>
<div id="ink"><div class="ink-base" id="ib"></div></div>
<div id="cm">CLEAR!</div>
<script>
if(!sessionStorage.getItem('m2Start'))sessionStorage.setItem('m2Start',Date.now());
function mkRng(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296;};}
var rng=mkRng(Number(sessionStorage.getItem('m2Seed'))||12345);
var D=45,ib=document.getElementById('ib'),inkC=document.getElementById('ink'),cleared=false;
var drops=[];for(var i=0;i<12;i++){var d=document.createElement('div');d.className='ink-drop';
var sz=40+rng()*80;d.style.width=d.style.height=sz+'px';
d.style.left=rng()*100+'%';d.style.animationDelay=-rng()*4+'s';
d.style.animationDuration=3+rng()*3+'s';inkC.appendChild(d);
drops.push({el:d,baseX:rng()*100,sz:sz,sp:.3+rng()*.7,off:rng()*Math.PI*2});}
document.getElementById('clearBtn').addEventListener('click',function(){if(cleared)return;cleared=true;
sessionStorage.setItem('m2Cleared',Date.now());document.getElementById('cm').style.display='block';
window.parent.postMessage({type:'PAGE_ARRIVED',panelId:2},'*');});
function tick(){var cl=sessionStorage.getItem('m2Cleared'),lv;
if(cl){var ct=(Date.now()-Number(cl))/1000;lv=Math.max(1-ct/3,0);}
else{var el=(Date.now()-Number(sessionStorage.getItem('m2Start')))/1000;lv=Math.min(el/D,1);}
var h=lv*100;ib.style.height=h+'%';
var t=Date.now()/1000;
for(var i=0;i<drops.length;i++){var dr=drops[i];
var by=h+dr.sz/window.innerHeight*100+Math.sin(t*dr.sp+dr.off)*4;
dr.el.style.bottom=by+'%';dr.el.style.left=dr.baseX+Math.sin(t*.5+dr.off)*6+'%';}
requestAnimationFrame(tick);}tick();
</script></body></html>
