<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | KAZUKI Hata</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1 class="brand">KAZUKI Hata</h1>
      <nav class="nav" aria-label="Primary">
        <a href="index.html">Exhibitions</a>
        <a href="biography.html">Biography</a>
        <a href="contact.html" aria-current="page">Contact</a>
      </nav>
    </aside>
    <main class="content">
      <header class="page-header" id="formHeader">
        <p class="eyebrow">Contact</p>
        <h1>Get in Touch</h1>
      </header>

      <form class="contact-form" id="contactForm" onsubmit="return false;">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="Exhibition inquiry, collaboration, etc.">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" placeholder="Write your message here..."></textarea>
        </div>
        <button type="button" class="submit-btn" id="submitBtn">Send Message</button>
      </form>

      <div class="symbol-hunt" id="symbolHunt">
        <div class="s" style="top:8%;left:20%">k</div>
        <div class="s" style="top:15%;right:25%">i</div>
        <a class="s" href="goal.html" style="top:45%;left:40%">e</a>
        <div class="s" style="top:60%;right:15%">m</div>
        <div class="s" style="bottom:10%;left:15%">d</div>
        <div class="s" style="bottom:20%;right:30%">o</div>
      </div>

      <p class="footer" id="footerText">&copy; KAZUKI Hata</p>
    </main>
  </div>

<script>
document.getElementById('submitBtn').addEventListener('click',function(){
  document.getElementById('contactForm').style.display='none';
  document.getElementById('formHeader').style.display='none';
  document.getElementById('symbolHunt').style.display='block';
});
</script>
</body>
</html>
