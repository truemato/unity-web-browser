<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aoki Shinya</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;background:#141414;overflow:hidden;font-family:'Helvetica Neue',Arial,sans-serif;color:#ccc;position:relative}
#content{width:100%;height:100%}

/* Top nav (home only) */
.topnav{position:absolute;top:0;left:0;width:100%;height:56px;display:flex;align-items:center;justify-content:center;gap:0;z-index:60;background:rgba(20,20,20,0.92);backdrop-filter:blur(6px);border-bottom:1px solid #333}
.topnav .brand{position:absolute;left:24px;font-size:18px;font-weight:300;letter-spacing:.12em;color:#ddd}
.topnav a{padding:16px 24px;font-size:13px;letter-spacing:.1em;color:#999;text-decoration:none;text-transform:uppercase;transition:background .2s}
.topnav a:hover{background:rgba(255,255,255,0.06)}
.topnav a.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600}

/* Sidebar layout (non-home pages) */
.layout{display:flex;width:100%;height:100%}
.sidebar{width:200px;min-width:200px;background:#1a1a1a;border-right:1px solid #333;padding:24px 0;display:flex;flex-direction:column;z-index:60}
.sidebar .brand{padding:0 20px 24px;font-size:15px;font-weight:700;letter-spacing:.08em;color:#ddd;border-bottom:1px solid #333;margin-bottom:12px}
.sidebar a{display:block;padding:10px 20px;font-size:13px;letter-spacing:.08em;color:#888;text-decoration:none;text-transform:uppercase;transition:background .2s}
.sidebar a:hover{background:rgba(255,255,255,0.06)}
.sidebar a.active{background:rgba(255,255,255,0.15);color:#fff;font-weight:600}

.main-content{flex:1;overflow-y:auto;padding:40px 48px;position:relative;background:#1e1e1e}

/* Hero (home) */
.hero{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:url('hero.png') center/cover no-repeat}
.hero-title{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);text-align:center;z-index:2}
.hero-title h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:300;letter-spacing:.2em;color:rgba(255,255,255,0.85)}
.hero-title p{font-size:14px;color:rgba(255,255,255,0.5);letter-spacing:.15em;margin-top:8px}

/* Profile */
.profile-header{display:flex;gap:40px;margin-bottom:40px;align-items:flex-start}
.profile-photo{width:200px;height:260px;background:linear-gradient(135deg,#3a3a3a,#2a2a2a,#444);border-radius:2px;flex-shrink:0}
.profile-info h1{font-size:28px;font-weight:300;letter-spacing:.1em;margin-bottom:4px;color:#eee}
.profile-info h2{font-size:16px;font-weight:400;color:#888;margin-bottom:20px}
.profile-info .statement{font-size:14px;line-height:1.9;color:#aaa}
.history-section{margin-top:48px}
.history-section h3{font-size:18px;font-weight:600;letter-spacing:.08em;margin-bottom:20px;color:#ddd}
.history-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.history-img{height:180px;background:linear-gradient(145deg,#333,#222,#2a2a2a);border-radius:2px}
.history-caption{font-size:12px;color:#888;margin-top:6px}

/* Biography timeline */
.page-header{margin-bottom:36px}
.page-header .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:#666;margin-bottom:4px}
.page-header h1{font-size:28px;font-weight:300;letter-spacing:.1em;color:#ddd}
.section{margin-bottom:40px}
.section h2{font-size:16px;font-weight:600;letter-spacing:.08em;margin-bottom:16px;color:#ddd;border-bottom:1px solid #333;padding-bottom:8px}
.timeline{display:flex;flex-direction:column;gap:0}
.timeline-card{display:flex;gap:20px;padding:12px 0;border-bottom:1px solid #2a2a2a}
.timeline-card .year{min-width:50px;font-weight:600;font-size:14px;color:#ccc}
.timeline-card p,.timeline-card li{font-size:13px;line-height:1.7;color:#999}
.timeline-card ul{list-style:none;padding:0}
.timeline-card ul li::before{content:'\2014\00a0';color:#555}

/* Portfolio grid */
.portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.portfolio-item{cursor:pointer;transition:transform .2s}
.portfolio-item:hover{transform:translateY(-4px)}
.portfolio-thumb{height:200px;border-radius:2px;position:relative;overflow:hidden}
.portfolio-thumb .overlay{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,0.7));color:#ddd;font-size:12px;letter-spacing:.06em}

/* Work page (puzzle) */
.work-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 80px)}
.white-cube{background:#222;border:1px solid #444;border-radius:4px;padding:32px;max-width:700px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.puzzle-header{text-align:center;margin-bottom:20px;font-size:14px;color:#888;letter-spacing:.1em}
.puzzle-area{display:flex;flex-direction:column;align-items:center;gap:20px}
.puzzle-problem{display:flex;justify-content:center}
.puzzle-choices{display:flex;gap:16px;justify-content:center}
.puzzle-choice{cursor:pointer;border:2px solid #444;border-radius:4px;padding:4px;transition:border-color .2s,transform .15s;background:#1a1a1a}
.puzzle-choice:hover{border-color:#888;transform:scale(1.05)}
.puzzle-choice.wrong{animation:wrongFlash .4s}
.puzzle-choice.correct{border-color:#4caf50}
@keyframes wrongFlash{0%,100%{border-color:#444;background:#1a1a1a}50%{border-color:#f44336;background:rgba(244,67,54,0.15)}}
.puzzle-status{text-align:center;font-size:18px;font-weight:600;color:#4caf50;letter-spacing:.1em}

/* Contact form */
.contact-form{max-width:500px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #444;border-radius:2px;font-size:14px;background:#2a2a2a;color:#ddd;font-family:inherit}
.form-group textarea{height:120px;resize:vertical}
.submit-btn{padding:12px 32px;border:1px solid #888;background:transparent;color:#ccc;font-size:13px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.submit-btn:hover{background:rgba(255,255,255,0.06)}

.footer{margin-top:48px;font-size:11px;color:#555;letter-spacing:.1em}

/* WebGL overlays */
canvas#fluid{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
canvas#spark{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:101}
#gameover{display:none;position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);font-size:clamp(2.5rem,6vw,5rem);font-weight:bold;color:transparent;-webkit-text-stroke:2px #fff;text-shadow:0 0 30px rgba(255,255,255,.3);z-index:200;letter-spacing:.15em}
#retry-btn{display:none;position:fixed;top:58%;left:50%;transform:translateX(-50%);padding:12px 36px;border:1px solid #fff;background:transparent;color:#fff;font-size:1rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;z-index:200}
#retry-btn:hover{background:rgba(255,255,255,.15)}
body.holding{cursor:none}
body.cursor-fade{cursor:none}
#hint{display:none;position:fixed;bottom:24px;right:24px;color:#fff;font-size:14px;letter-spacing:.1em;z-index:150;opacity:0;transition:opacity .8s}
#hint.show{display:block;opacity:1}
</style></head><body>

<div id="content"></div>
<div id="hint">Hint : Hold</div>
<canvas id="fluid"></canvas>
<canvas id="spark"></canvas>
<div id="gameover">GAME OVER</div><button id="retry-btn">Retry</button>

<script>
// ============================================================
// SPA Router
// ============================================================
var currentPage='home';
var hintTimer=null;
var contentEl=document.getElementById('content');

// Navigation HTML builders
function topNav(activePage){
  return '<div class="topnav">'
    +'<span class="brand">Aoki Shinya</span>'
    +'<a href="#" onclick="goTo(\'home\');return false" class="'+(activePage==='home'?'active':'')+'">Home</a>'
    +'<a href="#" onclick="goTo(\'profile\');return false" class="'+(activePage==='profile'?'active':'')+'">Profile</a>'
    +'<a href="#" onclick="goTo(\'biography\');return false" class="'+(activePage==='biography'?'active':'')+'">Biography</a>'
    +'<a href="#" onclick="goTo(\'portfolio\');return false" class="'+(activePage==='portfolio'?'active':'')+'">Portfolio</a>'
    +'<a href="#" onclick="goTo(\'contact\');return false" class="'+(activePage==='contact'?'active':'')+'">Contact</a>'
    +'</div>';
}

function sidebarLayout(activePage, mainHTML){
  return '<div class="layout">'
    +'<div class="sidebar">'
    +'<div class="brand">Aoki Shinya</div>'

    +'<a href="#" onclick="goTo(\'biography\');return false" class="'+(activePage==='biography'?'active':'')+'">Biography</a>'
    +'<a href="#" onclick="goTo(\'portfolio\');return false" class="'+(activePage==='portfolio'?'active':'')+'">Portfolio</a>'
    +'<a href="#" onclick="goTo(\'contact\');return false" class="'+(activePage==='contact'?'active':'')+'">Contact</a>'
    +'</div>'
    +'<div class="main-content">'+mainHTML+'</div>'
    +'</div>';
}

// Page definitions
var pagesData={
  home:{
    laser:false,
    render:function(){
      return topNav('home')
        +'<div class="hero">'
        +'<div class="hero-bg"></div>'
        +'<div class="hero-title"><h1>AOKI SHINYA</h1><p>Sculpture &amp; Installation</p></div>'

  },
  profile:{
    laser:true,
    render:function(){
      return sidebarLayout('profile',
        '<div class="profile-header">'
        +'<div class="profile-photo"></div>'
        +'<div class="profile-info">'
        +'<h1>\u9752\u6728\u771f\u4e5f</h1>'
        +'<h2>Aoki Shinya / \u5f6b\u523b\u30fb\u30a4\u30f3\u30b9\u30bf\u30ec\u30fc\u30b7\u30e7\u30f3</h2>'
        +'<div class="statement">'
        +'<p>\u300c\u900f\u904e\u3059\u308b\u3082\u306e\u300d\u3092\u4e3b\u984c\u306b\u5236\u4f5c\u6d3b\u52d5\u3092\u5c55\u958b\u3059\u308b\u3002</p>'
        +'<br><p>\u7a7a\u9593\u306b\u5b58\u5728\u3059\u308b\u898b\u3048\u306a\u3044\u5883\u754c\u2014\u2014\u5149\u3068\u5f71\u306e\u3042\u3044\u3060\u3001\u7269\u8cea\u3068\u975e\u7269\u8cea\u306e\u3042\u3044\u3060\u3001\u5185\u3068\u5916\u306e\u3042\u3044\u3060\u2014\u2014\u305d\u308c\u3089\u306e\u95a2\u4fc2\u6027\u3092\u63a2\u308a\u3001\u30ac\u30e9\u30b9\u3001\u6a39\u8102\u3001\u6c34\u3068\u3044\u3063\u305f\u900f\u904e\u6027\u306e\u3042\u308b\u7d20\u6750\u3092\u7528\u3044\u3066\u3001\u300c\u305d\u3053\u306b\u3042\u308b\u304c\u898b\u3048\u306a\u3044\u3082\u306e\u300d\u306e\u304b\u305f\u3061\u3092\u4e0e\u3048\u308b\u3053\u3068\u3092\u8a66\u307f\u3066\u3044\u308b\u3002</p>'
        +'<br><p>\u4f5c\u54c1\u306f\u89b3\u5bdf\u8005\u306e\u77e5\u899a\u3092\u901a\u3058\u3066\u521d\u3081\u3066\u5b8c\u6210\u3059\u308b\u3002\u305d\u306e\u610f\u5473\u3067\u3001\u79c1\u306f\u7a7a\u9593\u305d\u306e\u3082\u306e\u3092\u5f6b\u523b\u3057\u3066\u3044\u308b\u306e\u304b\u3082\u3057\u308c\u306a\u3044\u3002</p>'
        +'</div></div></div>'
        +'<div class="history-section">'
        +'<h3>Exhibition History</h3>'
        +'<div class="history-grid">'
        +'<div><div class="history-img" style="background:linear-gradient(145deg,#c8c0b8,#a8a0a0,#d0c8c0)"></div><div class="history-caption">\u300cGlass Sentence for an Empty Room\u300d Passage 17 2024</div></div>'
        +'<div><div class="history-img" style="background:linear-gradient(145deg,#b0b8c0,#909898,#c0c8c0)"></div><div class="history-caption">\u300cPerimeter of Condensed Air\u300d Orbit House 2022</div></div>'
        +'<div><div class="history-img" style="background:linear-gradient(145deg,#d0d0c8,#b8b0a8,#c8c8c0)"></div><div class="history-caption">\u300cIndex for a Transparent Wall\u300d Feldweg Raum 2020</div></div>'

  },
  biography:{
    laser:true,
    render:function(){
      return sidebarLayout('biography',
        '<header class="page-header"><p class="eyebrow">Biography</p><h1>Chronology</h1></header>'

        +'<section class="section"><h2>Education</h2><div class="timeline">'
        +'<article class="timeline-card"><div class="year">1990</div><div><p>Born in Maebashi, Gunma, Japan</p></div></article>'

        +'<article class="timeline-card"><div class="year">2016</div><div><ul><li>\u201cResin Court\u201d, South Exit Gallery, Takasaki, Gunma, Japan</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2017</div><div><ul><li>\u201cVolume Without Shadow\u201d, Shelf West, Maebashi, Gunma, Japan</li><li>\u201cIndex for a Transparent Wall\u201d (with Maren Volk), Rhein Nord Halle, D\u00fcsseldorf, Germany</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2018</div><div><ul><li>\u201cPerimeter of Condensed Air\u201d, Orbit House, Maebashi, Gunma, Japan</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2020</div><div><ul><li>\u201cGlass Sentence for an Empty Room\u201d, Feldweg Raum, D\u00fcsseldorf, Germany</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2021</div><div><ul><li>\u201cLight Cast by a Missing Object\u201d, Nullstelle, D\u00fcsseldorf, Germany</li><li>\u201cA Thin Theory of Held Air\u201d, Passage 17, D\u00fcsseldorf, Germany</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2024</div><div><ul><li>\u201cLiminal Form\u201d, Museum of Local Distance, Maebashi, Gunma, Japan</li></ul></div></article>'
        +'</div></section>'

        +'<section class="section"><h2>Group Exhibitions</h2><div class="timeline">'
        +'<article class="timeline-card"><div class="year">2016</div><div><ul><li>\u201cOpen Shelf / Closed Field\u201d, Civic Gallery, Takasaki, Gunma, Japan</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2017</div><div><ul><li>\u201cWet Paper, Dry Air\u201d, Orbit House, Maebashi, Gunma, Japan</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2019</div><div><ul><li>\u201cRoadside Grammar\u201d, Orbit House, Maebashi, Gunma, Japan</li><li>\u201cUneven Weather\u201d, Canal Frame, Maebashi, Gunma, Japan</li></ul></div></article>'
        +'<article class="timeline-card"><div class="year">2020</div><div><ul><li>\u201cField Notes for an Indoor Use\u201d, Museum of Peripheral Forms, Maebashi, Gunma, Japan</li></ul></div></article>'

        +'<p class="footer">&copy; Aoki Shinya</p>'

  },
  portfolio:{
    laser:true,
    render:function(){
      var works=[
        {id:'w1',title:'Liminal Form',year:'2024',grad:'linear-gradient(135deg,#c8bfb8,#a8a0a8,#d0c8d0)'},
        {id:'w2',title:'Glass Sentence for an Empty Room',year:'2020',grad:'linear-gradient(135deg,#b0b8c8,#8898a8,#c0c8d0)'},
        {id:'w3',title:'A Thin Theory of Held Air',year:'2021',grad:'linear-gradient(135deg,#d0d0c0,#b0a8a0,#c8c0b8)'},

        {id:'w5',title:'Volume Without Shadow',year:'2017',grad:'linear-gradient(135deg,#c8c0c8,#a8a0b0,#d0c8d8)'},
        {id:'w6',title:'Light Cast by a Missing Object',year:'2021',grad:'linear-gradient(135deg,#d0c8b8,#b8b0a0,#c8c0b0)'}
      ];
      var grid='';
      for(var i=0;i<works.length;i++){
        var w=works[i];
        grid+='<div class="portfolio-item" onclick="goTo(\'work\');return false">'
          +'<div class="portfolio-thumb" style="background:'+w.grad+'">'
          +'<div class="overlay">'+w.title+' / '+w.year+'</div>'

  work:{
    laser:true,
    render:function(){
      return sidebarLayout('portfolio',
        '<div class="work-page">'
        +'<div class="white-cube">'
        +'<div class="puzzle-header">Round <span id="puzzleRound">1</span> / 5</div>'
        +'<div class="puzzle-area">'
        +'<div style="display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap">'

        +'<div class="form-group"><label for="c-name">\u304a\u540d\u524d</label><input type="text" id="c-name" placeholder="\u6c0f\u540d\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044"></div>'

        +'<div class="form-group"><label for="c-message">\u30e1\u30c3\u30bb\u30fc\u30b8</label><textarea id="c-message" placeholder="\u304a\u554f\u3044\u5408\u308f\u305b\u5185\u5bb9\u3092\u3054\u8a18\u5165\u304f\u3060\u3055\u3044\u2026"></textarea></div>'
        +'<button type="button" class="submit-btn">\u9001\u4fe1\u3059\u308b</button>'

        +'<p class="footer">&copy; Aoki Shinya</p>'

};

function goTo(page){
  if(!pagesData[page])return;
  if(gameOver&&page!=='home')return;
  currentPage=page;
  contentEl.innerHTML=pagesData[page].render();

  var hintEl=document.getElementById('hint');
  hintEl.style.display='none';hintEl.classList.remove('show');
  if(hintTimer)clearTimeout(hintTimer);hintTimer=null;

  if(page==='home'){
    sessionStorage.removeItem('m2Cleared');
    sessionStorage.setItem('m2Seed',String(Date.now()%100000));
    sessionStorage.removeItem('m2Start');
    rng=mkRng(Number(sessionStorage.getItem('m2Seed'))||12345);
    gameOver=false;cleared=false;sparks=[];flashStart=0;
    puzzleRound=0;
    resetFBO();
    document.getElementById('gameover').style.display='none';
    document.getElementById('retry-btn').style.display='none';
  }

  if(page!=='home'&&!sessionStorage.getItem('m2Start')){
    sessionStorage.setItem('m2Start',String(Date.now()+10000));
  }

  var delay=pagesData[page].hintDelay;
  if(delay){
    hintTimer=setTimeout(function(){
      var h=document.getElementById('hint');
      h.style.display='block';
      requestAnimationFrame(function(){h.classList.add('show');});
    },delay);
  }

  if(pagesData[page].init) pagesData[page].init();
}

// ============================================================
// 3D Face-based Solid Renderer
// ============================================================
function iso(x,y,z,s){return{x:(x-z)*0.866*s,y:((x+z)*0.5-y)*s};}

function renderSolid(ctx,verts,faces,fillColor,strokeColor,scale,ox,oy){
  var proj=[];
  for(var i=0;i<verts.length;i++){var p=iso(verts[i][0],verts[i][1],verts[i][2],scale);proj.push({x:p.x+ox,y:p.y+oy});}
  var fd=[];
  for(var i=0;i<faces.length;i++){
    var f=faces[i];if(f.length<3)continue;
    var a=proj[f[0]],b=proj[f[1]],c=proj[f[2]];
    var cross=(b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);
    if(cross<=0)continue;
    var d=0;for(var j=0;j<f.length;j++){var v=verts[f[j]];d+=v[0]+v[2]-v[1];}d/=f.length;
    fd.push({f:f,d:d});
  }
  fd.sort(function(a,b){return a.d-b.d;});
  for(var i=0;i<fd.length;i++){
    var f=fd[i].f;
    ctx.beginPath();ctx.moveTo(proj[f[0]].x,proj[f[0]].y);
    for(var j=1;j<f.length;j++)ctx.lineTo(proj[f[j]].x,proj[f[j]].y);
    ctx.closePath();
    ctx.fillStyle=fillColor;ctx.fill();
    ctx.strokeStyle=strokeColor;ctx.lineWidth=1.5;ctx.stroke();
  }
}

function centerOffset(verts,scale,cw,ch){
  var mn={x:1e9,y:1e9},mx={x:-1e9,y:-1e9};
  for(var i=0;i<verts.length;i++){var p=iso(verts[i][0],verts[i][1],verts[i][2],scale);if(p.x<mn.x)mn.x=p.x;if(p.x>mx.x)mx.x=p.x;if(p.y<mn.y)mn.y=p.y;if(p.y>mx.y)mx.y=p.y;}
  return{x:cw/2-(mn.x+mx.x)/2,y:ch/2-(mn.y+mx.y)/2};
}

function drawSolidOnCanvas(cv,verts,faces,fill,stroke,scale){
  var ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
  var o=centerOffset(verts,scale,cv.width,cv.height);
  renderSolid(ctx,verts,faces,fill,stroke,scale,o.x,o.y);
}

// ============================================================
// Shape Generators
// ============================================================
function genPyramid(n,r,h){
  var v=[];
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;v.push([Math.cos(a)*r,0,Math.sin(a)*r]);}
  v.push([0,h,0]);
  var f=[];
  var base=[];for(var i=n-1;i>=0;i--)base.push(i);f.push(base);
  for(var i=0;i<n;i++)f.push([i,(i+1)%n,n]);
  return{v:v,f:f};
}

function genFrustum(n,rB,rT,hB,hT){
  var v=[];
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;v.push([Math.cos(a)*rB,hB,Math.sin(a)*rB]);}
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;v.push([Math.cos(a)*rT,hT,Math.sin(a)*rT]);}
  var f=[];
  var base=[];for(var i=n-1;i>=0;i--)base.push(i);f.push(base);
  var top=[];for(var i=0;i<n;i++)top.push(n+i);f.push(top);
  for(var i=0;i<n;i++){var j=(i+1)%n;f.push([i,j,n+j,n+i]);}
  return{v:v,f:f};
}

function genPrism(n,r,h){return genFrustum(n,r,r,0,h);}

function genSmallPyramid(n,rB,hB,hT){
  var v=[];
  for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;v.push([Math.cos(a)*rB,hB,Math.sin(a)*rB]);}
  v.push([0,hT,0]);
  var f=[];
  var base=[];for(var i=n-1;i>=0;i--)base.push(i);f.push(base);
  for(var i=0;i<n;i++)f.push([i,(i+1)%n,n]);
  return{v:v,f:f};
}

function showPuzzleRound(){
  var roundEl=document.getElementById('puzzleRound');

  if(statusEl)statusEl.textContent='';
  choicesEl.innerHTML='';

  var puzzleRng=mkRng((Number(sessionStorage.getItem('m2Seed'))||12345)+puzzleRound*7919);

  // Draw pieces
  drawSolidOnCanvas(cvA,pz.pieceA.v,pz.pieceA.f,'rgba(70,130,230,0.5)','rgba(30,60,120,0.8)',30);
  drawSolidOnCanvas(cvB,pz.pieceB.v,pz.pieceB.f,'rgba(220,100,70,0.5)','rgba(120,40,20,0.8)',30);

  // Build choices
  var choices=[
    {shape:pz.correct,isCorrect:true},
    {shape:pz.wrong1,isCorrect:false},
    {shape:pz.wrong2,isCorrect:false}
  ];
  // Shuffle choices
  for(var i=choices.length-1;i>0;i--){var j=Math.floor(puzzleRng()*(i+1));var t=choices[i];choices[i]=choices[j];choices[j]=t;}

  for(var i=0;i<choices.length;i++){
    var cv=document.createElement('canvas');
    cv.width=140;cv.height=140;
    cv.className='puzzle-choice';
    cv.style.background='#1a1a1a';
    drawSolidOnCanvas(cv,choices[i].shape.v,choices[i].shape.f,'rgba(120,120,255,0.45)','rgba(40,40,100,0.8)',24);
    (function(choice,cvEl){

        if(cleared||gameOver)return;

          cvEl.classList.add('wrong');
          setTimeout(function(){cvEl.classList.remove('wrong');},400);
        }
      });
    })(choices[i],cv);
    choicesEl.appendChild(cv);
  }
}

function mkRng(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296;};}

var canvas=document.getElementById('fluid');
var gl=canvas.getContext('webgl',{alpha:true,premultipliedAlpha:false});
var SIM=256;

function createShader(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s;}
function createProgram(vs,fs){var p=gl.createProgram();gl.attachShader(p,createShader(gl.VERTEX_SHADER,vs));gl.attachShader(p,createShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(p));return p;}

var quadBuf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
var QUAD_VS='attribute vec2 a;varying vec2 v;void main(){v=a*.5+.5;gl_Position=vec4(a,0,1);}';

var stepFS='precision highp float;varying vec2 v;uniform sampler2D u_tex;void main(){float dx=1.0/'+SIM+'.0;vec2 d=texture2D(u_tex,v).rg;float h=d.r,vel=d.g;float hL=texture2D(u_tex,v+vec2(-dx,0)).r;float hR=texture2D(u_tex,v+vec2(dx,0)).r;float hU=texture2D(u_tex,v+vec2(0,dx)).r;float hD=texture2D(u_tex,v+vec2(0,-dx)).r;float avg=(hL+hR+hU+hD)*0.25;vel+=(avg-h)*2.0;vel*=0.985;h+=vel;gl_FragColor=vec4(h,vel,0,1);}';
var stepProg=createProgram(QUAD_VS,stepFS);var stepTexLoc=gl.getUniformLocation(stepProg,'u_tex');var stepALoc=gl.getAttribLocation(stepProg,'a');

var dropFS='precision highp float;varying vec2 v;uniform sampler2D u_tex;uniform vec2 u_center;uniform float u_radius;uniform float u_strength;void main(){vec2 d=texture2D(u_tex,v).rg;float dist=length(v-u_center)/u_radius;if(dist<1.0){float drop=0.5-cos(dist*3.14159265)*0.5;d.r+=(1.0-drop)*u_strength;}gl_FragColor=vec4(d,0,1);}';
var dropProg=createProgram(QUAD_VS,dropFS);var dropTexLoc=gl.getUniformLocation(dropProg,'u_tex');var dropCenterLoc=gl.getUniformLocation(dropProg,'u_center');var dropRadiusLoc=gl.getUniformLocation(dropProg,'u_radius');var dropStrengthLoc=gl.getUniformLocation(dropProg,'u_strength');var dropALoc=gl.getAttribLocation(dropProg,'a');

var renderFS='precision highp float;varying vec2 v;uniform sampler2D u_tex;uniform float u_pos;uniform float u_dir;uniform float u_pxSize;uniform float u_flash;void main(){'
+'float h=texture2D(u_tex,v).r;float dx=1.0/'+SIM+'.0;'
+'float hL=texture2D(u_tex,v+vec2(-dx,0)).r;float hR=texture2D(u_tex,v+vec2(dx,0)).r;'
+'float hU=texture2D(u_tex,v+vec2(0,dx)).r;float hD=texture2D(u_tex,v+vec2(0,-dx)).r;'
+'float isV=step(0.5,u_dir);'
+'float normalPerp=mix((hL-hR)*8.0,(hD-hU)*8.0,isV);'
+'float distFromLaser=mix(v.y-(u_pos+normalPerp*0.01),v.x-(u_pos+normalPerp*0.01),isV);'
+'float absDist=abs(distFromLaser);'
+'float coreHalf=mix(2.5,4.0,u_flash)*u_pxSize;float core=1.0-smoothstep(0.0,coreHalf,absDist);'
+'float glowHalf=mix(40.0,70.0,u_flash)*u_pxSize;float glow=(1.0-smoothstep(0.0,glowHalf,absDist))*mix(0.35,0.6,u_flash);'
+'float rippleBand=60.0*u_pxSize;float rippleVis=1.0-smoothstep(0.0,rippleBand,absDist);'
+'float ripple=h*rippleVis*2.0;'
+'float intensity=core+glow+abs(ripple)*0.3;if(intensity<0.005)discard;'
+'float gBase=clamp(core*1.2+glow*0.8+ripple*0.4,0.0,1.0);'
+'float rBase=core*0.15+abs(ripple)*0.1;float bBase=core*0.05;'
+'float w=clamp(core+glow*0.8,0.0,1.0)*u_flash;'
+'float r=mix(rBase,1.0,w);float g=mix(gBase,1.0,w);float b=mix(bBase,1.0,w);'
+'float alpha=clamp(core*0.95+glow+abs(ripple)*0.2,0.0,1.0);'
+'gl_FragColor=vec4(r,g,b,alpha);}';
var renderProg=createProgram(QUAD_VS,renderFS);
var renderTexLoc=gl.getUniformLocation(renderProg,'u_tex');
var renderPosLoc=gl.getUniformLocation(renderProg,'u_pos');
var renderDirLoc=gl.getUniformLocation(renderProg,'u_dir');
var renderPxSizeLoc=gl.getUniformLocation(renderProg,'u_pxSize');
var renderFlashLoc=gl.getUniformLocation(renderProg,'u_flash');
var renderALoc=gl.getAttribLocation(renderProg,'a');

var ext=gl.getExtension('OES_texture_float');gl.getExtension('OES_texture_float_linear');
function createFBO(){var tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,SIM,SIM,0,gl.RGBA,gl.FLOAT,null);var fb=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,fb);gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);return{tex:tex,fb:fb};}
var fboA=createFBO(),fboB=createFBO();

function drawQuad(aLoc){gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);gl.enableVertexAttribArray(aLoc);gl.vertexAttribPointer(aLoc,2,gl.FLOAT,false,0,0);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}
function stepSim(){gl.useProgram(stepProg);gl.bindFramebuffer(gl.FRAMEBUFFER,fboB.fb);gl.viewport(0,0,SIM,SIM);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fboA.tex);gl.uniform1i(stepTexLoc,0);drawQuad(stepALoc);var tmp=fboA;fboA=fboB;fboB=tmp;}
function addDrop(cx,cy,radius,strength){gl.useProgram(dropProg);gl.bindFramebuffer(gl.FRAMEBUFFER,fboB.fb);gl.viewport(0,0,SIM,SIM);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fboA.tex);gl.uniform1i(dropTexLoc,0);gl.uniform2f(dropCenterLoc,cx,cy);gl.uniform1f(dropRadiusLoc,radius);gl.uniform1f(dropStrengthLoc,strength);drawQuad(dropALoc);var tmp=fboA;fboA=fboB;fboB=tmp;}

// ============================================================
// Laser Phase System
// ============================================================
function getLaserState(el){
  var totalTime=el%(PHASE_DUR*4);
  var phaseIdx=Math.floor(totalTime/PHASE_DUR);
  var p=(totalTime%PHASE_DUR)/PHASE_DUR;
  var dir,pos;
  switch(phaseIdx){
    case 0:dir=0;pos=p;break;
    case 1:dir=1;pos=1-p;break;
    case 2:dir=1;pos=p;break;
    case 3:dir=0;pos=1-p;break;
  }
  return{dir:dir,pos:pos,phaseIdx:phaseIdx};
}

function checkHit(laserDir,laserPos){
  if(gameOver||cleared)return;
  if(mouseHeld||mouseX<0)return;
  if(laserDir===0){
    var screenY=(1-laserPos)*window.innerHeight;
    if(Math.abs(mouseY-screenY)<LASER_HIT_PX)triggerFlash();
  }else{
    var screenX=laserPos*window.innerWidth;
    if(Math.abs(mouseX-screenX)<LASER_HIT_PX)triggerFlash();
  }
}

var sparks=[];
function spawnSparks(laserPos,laserDir){
  var W=window.innerWidth,H=window.innerHeight;
  for(var i=0;i<200;i++){
    var x,y;
    if(laserDir===0){x=Math.random()*W;y=(1-laserPos)*H;}
    else{x=laserPos*W;y=Math.random()*H;}
    var angle=Math.random()*Math.PI*2;
    var speed=150+Math.random()*500;
    sparks.push({
      x:x,y:y,
      vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      life:1.0,decay:0.4+Math.random()*0.8,
      size:1+Math.random()*3,bright:Math.random()
    });
  }
}

var lastSparkTime=0;
function updateSparks(now){
  if(sparks.length===0){sparkCtx.clearRect(0,0,sparkCv.width,sparkCv.height);return;}
  var dt=lastSparkTime?Math.min((now-lastSparkTime)/1000,0.05):0.016;
  lastSparkTime=now;
  sparkCtx.clearRect(0,0,sparkCv.width,sparkCv.height);
  for(var i=sparks.length-1;i>=0;i--){
    var s=sparks[i];
    s.x+=s.vx*dt;s.y+=s.vy*dt;
    s.vy+=300*dt;
    s.vx*=0.98;s.vy*=0.98;
    s.life-=s.decay*dt;
    if(s.life<=0){sparks.splice(i,1);continue;}
    sparkCtx.globalAlpha=s.life;
    sparkCtx.fillStyle=s.bright>0.7?'#fff':'#0f0';
    sparkCtx.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);
    sparkCtx.globalAlpha=s.life*0.4;
    sparkCtx.beginPath();
    sparkCtx.moveTo(s.x,s.y);
    sparkCtx.lineTo(s.x-s.vx*dt*4,s.y-s.vy*dt*4);
    sparkCtx.strokeStyle=s.bright>0.5?'rgba(255,255,255,0.6)':'rgba(0,255,0,0.6)';
    sparkCtx.lineWidth=s.size*0.6;
    sparkCtx.stroke();
  }
  sparkCtx.globalAlpha=1;
}

// ============================================================
// Main Loop
// ============================================================
var lastDrop=0;
function tick(now){
  var active=pagesData[currentPage]&&pagesData[currentPage].laser;
  var ts=now||performance.now();

  if(active&&!cleared){
    var startT=sessionStorage.getItem('m2Start');
    if(startT){
      var el=(Date.now()-Number(startT))/1000;
      if(el>0){
        var ls=getLaserState(el);

        checkHit(ls.dir,ls.pos);

        var flash=flashStart?Math.max(0,1-(ts-flashStart)/1000):0;

        var dropNow=Date.now();
        if(dropNow-lastDrop>120+rng()*200){
          lastDrop=dropNow;
          if(ls.dir===0)addDrop(rng(),ls.pos,0.015+rng()*0.02,0.1+rng()*0.15);
          else addDrop(ls.pos,rng(),0.015+rng()*0.02,0.1+rng()*0.15);
        }
        stepSim();stepSim();

        gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,canvas.width,canvas.height);
        gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
        gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
        gl.useProgram(renderProg);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fboA.tex);
        gl.uniform1i(renderTexLoc,0);
        gl.uniform1f(renderPosLoc,ls.pos);
        gl.uniform1f(renderDirLoc,ls.dir);
        gl.uniform1f(renderPxSizeLoc,ls.dir===0?1.0/canvas.height:1.0/canvas.width);
        gl.uniform1f(renderFlashLoc,flash);
        drawQuad(renderALoc);gl.disable(gl.BLEND);
      }else{
        gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,canvas.width,canvas.height);
        gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
      }
    }
  }else{
    gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,canvas.width,canvas.height);
    gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
  }

  updateSparks(now||performance.now());
  requestAnimationFrame(tick);
}

// ============================================================
// Boot
// ============================================================
goTo('home');
tick();
</script></body></html>
