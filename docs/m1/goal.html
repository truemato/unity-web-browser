<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>P1-Goal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;background:#e0e0e0;overflow:hidden;font-family:sans-serif;position:relative}
.s{position:absolute;width:60px;height:60px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:bold;color:#fff;background:#333;border:4px solid #999;box-shadow:2px 2px 6px rgba(0,0,0,.3);text-decoration:none;cursor:default;user-select:none;z-index:50}
a.s{cursor:pointer}a.s:hover{background:#555}
.n{position:absolute;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;background:#666;text-decoration:none;cursor:default;z-index:50}
a.n{cursor:pointer}a.n:hover{background:#888}
.ban{position:absolute;top:10%;left:50%;transform:translateX(-50%);background:#666;color:#fff;padding:8px 24px;font-size:22px;font-weight:bold;border-radius:6px;z-index:50}
#cm{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;color:#666;z-index:200}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:40}
</style></head><body>
<div class="ban">ナツメ</div>
<a class="n" href="javascript:void(0)" id="clearBtn" style="top:28%;left:50%;transform:translateX(-50%)">5</a>
<div class="s" style="top:55%;right:15%">e</div>
<div id="cm">CLEAR!</div>
<canvas id="c"></canvas>
<script>
"use strict";
if(!sessionStorage.getItem('m1Start'))sessionStorage.setItem('m1Start',Date.now());



/* === PRNG === */
function mkRng(s){return function(){s|=0;s=s+0x6D2B79F5|0;var t=Math.imul(s^s>>>15,1|s);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296;};}
var rng=mkRng(Number(sessionStorage.getItem('m1Seed')));

/* === WebGL2 Setup === */
var cv=document.getElementById('c'),gl=cv.getContext('webgl2',{alpha:true,premultipliedAlpha:false});
var ext=gl.getExtension('EXT_color_buffer_float');
gl.getExtension('OES_texture_float_linear');

var SIM=128; // simulation grid resolution
var D=45; // seconds to fill

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

/* === Shader Compilation === */
var VS='#version 300 es\nin vec2 a;out vec2 vUv;void main(){vUv=a*.5+.5;gl_Position=vec4(a,0,1);}';

function createShader(src){
  var vs=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(vs,VS);gl.compileShader(vs);
  var fs=gl.createShader(gl.FRAGMENT_SHADER);gl.shaderSource(fs,src);gl.compileShader(fs);
  if(!gl.getShaderParameter(fs,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(fs));
  var p=gl.createProgram();gl.attachShader(p,vs);gl.attachShader(p,fs);gl.linkProgram(p);
  return p;
}

function getUniforms(prog,names){var u={};names.forEach(function(n){u[n]=gl.getUniformLocation(prog,n);});return u;}

/* === Fullscreen Quad === */
var quadBuf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

function drawQuad(prog){
  gl.useProgram(prog);
  var a=gl.getAttribLocation(prog,'a');
  gl.enableVertexAttribArray(a);
  gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

/* === Framebuffer Textures === */
function createFBO(w,h,internalFmt,fmt,type){
  var tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,internalFmt,w,h,0,fmt,type,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  var fb=gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER,fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);
  return{tex:tex,fb:fb,w:w,h:h};
}

function createDoubleFBO(w,h,internalFmt,fmt,type){
  return{read:createFBO(w,h,internalFmt,fmt,type),write:createFBO(w,h,internalFmt,fmt,type)};
}

function swapFBO(d){var t=d.read;d.read=d.write;d.write=t;}

var velocity=createDoubleFBO(SIM,SIM,gl.RG32F,gl.RG,gl.FLOAT);
var pressure=createDoubleFBO(SIM,SIM,gl.R32F,gl.RED,gl.FLOAT);
var dye=createDoubleFBO(SIM,SIM,gl.RGBA32F,gl.RGBA,gl.FLOAT);

/* === Shaders === */

// Add Force
var addForceProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uVel;
uniform vec2 uPoint;
uniform vec2 uForce;
uniform float uRadius;
void main(){
  vec2 v=texture(uVel,vUv).xy;
  vec2 d=vUv-uPoint;
  float m=exp(-dot(d,d)/(uRadius*uRadius+1e-6));
  v+=uForce*m;
  o=vec4(v,0,0);
}`);
var addForceU=getUniforms(addForceProg,['uVel','uPoint','uForce','uRadius']);

// Add Dye
var addDyeProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uDye;
uniform vec2 uPoint;
uniform float uRadius;
uniform vec4 uColor;
void main(){
  vec4 c=texture(uDye,vUv);
  vec2 d=vUv-uPoint;
  float m=exp(-dot(d,d)/(uRadius*uRadius+1e-6));
  c+=uColor*m;
  o=c;
}`);
var addDyeU=getUniforms(addDyeProg,['uDye','uPoint','uRadius','uColor']);

// Advect
var advectProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uVel;
uniform sampler2D uSource;
uniform float uDt;
uniform float uDissipation;
uniform vec2 uTexel;
void main(){
  vec2 v=texture(uVel,vUv).xy;
  vec2 backUv=vUv-v*uDt*uTexel;
  o=texture(uSource,backUv)*uDissipation;
}`);
var advectU=getUniforms(advectProg,['uVel','uSource','uDt','uDissipation','uTexel']);

// Divergence
var divProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uVel;
uniform vec2 uTexel;
void main(){
  float L=texture(uVel,vUv-vec2(uTexel.x,0)).x;
  float R=texture(uVel,vUv+vec2(uTexel.x,0)).x;
  float B=texture(uVel,vUv-vec2(0,uTexel.y)).y;
  float T=texture(uVel,vUv+vec2(0,uTexel.y)).y;
  o=vec4(.5*(R-L+T-B),0,0,0);
}`);
var divU=getUniforms(divProg,['uVel','uTexel']);

// Pressure Jacobi
var pressureProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uPressure;
uniform sampler2D uDiv;
uniform vec2 uTexel;
void main(){
  float L=texture(uPressure,vUv-vec2(uTexel.x,0)).x;
  float R=texture(uPressure,vUv+vec2(uTexel.x,0)).x;
  float B=texture(uPressure,vUv-vec2(0,uTexel.y)).x;
  float T=texture(uPressure,vUv+vec2(0,uTexel.y)).x;
  float d=texture(uDiv,vUv).x;
  o=vec4((L+R+B+T-d)*.25,0,0,0);
}`);
var pressureU=getUniforms(pressureProg,['uPressure','uDiv','uTexel']);

// Gradient Subtract
var gradProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uVel;
uniform sampler2D uPressure;
uniform vec2 uTexel;
void main(){
  float L=texture(uPressure,vUv-vec2(uTexel.x,0)).x;
  float R=texture(uPressure,vUv+vec2(uTexel.x,0)).x;
  float B=texture(uPressure,vUv-vec2(0,uTexel.y)).x;
  float T=texture(uPressure,vUv+vec2(0,uTexel.y)).x;
  vec2 v=texture(uVel,vUv).xy;
  v-=.5*vec2(R-L,T-B);
  o=vec4(v,0,0);
}`);
var gradU=getUniforms(gradProg,['uVel','uPressure','uTexel']);

// Rising water force (continuous upward force from bottom)
var waterForceProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uVel;
uniform float uLevel;
uniform float uStrength;
void main(){
  vec2 v=texture(uVel,vUv).xy;
  // Apply upward force near and below current water level
  float dist=vUv.y-uLevel;
  // Strong force below level, fading above
  float band=smoothstep(-.05,0.0,dist)*smoothstep(.15,0.0,dist);
  // Also push everything below level upward gently
  float below=smoothstep(uLevel+.05,0.0,vUv.y);
  v.y+=(band*2.0+below*0.5)*uStrength;
  o=vec4(v,0,0);
}`);
var waterForceU=getUniforms(waterForceProg,['uVel','uLevel','uStrength']);

// Add dye for water body
var waterDyeProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uDye;
uniform float uLevel;
void main(){
  vec4 c=texture(uDye,vUv);
  // Fill below water level with density
  float fill=smoothstep(uLevel+.02,uLevel-.02,vUv.y);
  c.r=max(c.r,fill);
  o=c;
}`);
var waterDyeU=getUniforms(waterDyeProg,['uDye','uLevel']);

// Final render - water level drawn here, fluid sim used for surface distortion
var renderProg=createShader(`#version 300 es
precision highp float;
in vec2 vUv;out vec4 o;
uniform sampler2D uDye;
uniform sampler2D uVel;
uniform vec2 uTexel;
uniform float uWaterLevel;
void main(){
  vec2 vel=texture(uVel,vUv).xy;
  float dyeD=texture(uDye,vUv).r;

  // Distort the water surface line using velocity field
  float surfaceDistort=vel.y*0.015+vel.x*0.008;

  // Multi-scale dye gradient for surface detail
  float cL=texture(uDye,vUv-vec2(uTexel.x*3.0,0)).r;
  float cR=texture(uDye,vUv+vec2(uTexel.x*3.0,0)).r;
  float cB=texture(uDye,vUv-vec2(0,uTexel.y*3.0)).r;
  float cT=texture(uDye,vUv+vec2(0,uTexel.y*3.0)).r;
  vec2 grad=vec2(cR-cL,cT-cB)*0.5;
  float edgeIntensity=length(grad);

  // Water surface with fluid distortion
  float waterLine=uWaterLevel+surfaceDistort+dyeD*0.02;
  float inWater=smoothstep(waterLine+0.008,waterLine-0.008,vUv.y);

  // Background
  vec3 bg=vec3(0.878);

  // Fluid body color (dark)
  vec3 fluidCol=vec3(0.08);

  // Surface highlight - bright edge where water meets air
  float surfaceBand=smoothstep(0.0,0.015,abs(vUv.y-waterLine));
  surfaceBand=1.0-surfaceBand;
  vec3 surfaceHighlight=vec3(0.35)*surfaceBand;

  // Velocity-based caustics near surface
  float speed=length(vel);
  vec3 caustics=vec3(0.12)*speed*smoothstep(0.0,0.05,abs(vUv.y-waterLine));
  caustics*=smoothstep(0.15,0.0,abs(vUv.y-waterLine));

  // Falling blob dye above water (semi-transparent dark blobs)
  float aboveWater=smoothstep(waterLine-0.01,waterLine+0.01,vUv.y);
  float blobAlpha=smoothstep(0.0,0.3,dyeD)*aboveWater;

  // Compose
  vec3 col=mix(bg,fluidCol+surfaceHighlight+caustics,inWater);
  // Add blob dye above water
  col=mix(col,vec3(0.1),blobAlpha*0.8);
  // Edge refraction shimmer
  col+=vec3(0.06)*edgeIntensity*smoothstep(0.1,0.0,abs(vUv.y-waterLine));

  float alpha=max(inWater,blobAlpha*0.8);
  o=vec4(col,alpha);
}`);
var renderU=getUniforms(renderProg,['uDye','uVel','uTexel','uWaterLevel']);

// Divergence FBO (single, not double)
var divFBO=createFBO(SIM,SIM,gl.R32F,gl.RED,gl.FLOAT);

var texel=new Float32Array([1.0/SIM,1.0/SIM]);

/* === Bind helpers === */
function bindTex(prog,name,unit,tex){
  gl.activeTexture(gl.TEXTURE0+unit);
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.uniform1i(gl.getUniformLocation(prog,name),unit);
}

/* === Simulation Step Functions === */
function stepAddForce(px,py,fx,fy,radius){
  gl.bindFramebuffer(gl.FRAMEBUFFER,velocity.write.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(addForceProg);
  bindTex(addForceProg,'uVel',0,velocity.read.tex);
  gl.uniform2f(addForceU.uPoint,px,py);
  gl.uniform2f(addForceU.uForce,fx,fy);
  gl.uniform1f(addForceU.uRadius,radius);
  drawQuad(addForceProg);
  swapFBO(velocity);
}

function stepWaterForce(level,strength){
  gl.bindFramebuffer(gl.FRAMEBUFFER,velocity.write.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(waterForceProg);
  bindTex(waterForceProg,'uVel',0,velocity.read.tex);
  gl.uniform1f(waterForceU.uLevel,level);
  gl.uniform1f(waterForceU.uStrength,strength);
  drawQuad(waterForceProg);
  swapFBO(velocity);
}

function stepWaterDye(level){
  gl.bindFramebuffer(gl.FRAMEBUFFER,dye.write.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(waterDyeProg);
  bindTex(waterDyeProg,'uDye',0,dye.read.tex);
  gl.uniform1f(waterDyeU.uLevel,level);
  drawQuad(waterDyeProg);
  swapFBO(dye);
}

function stepAddDye(px,py,radius,r,g,b,a){
  gl.bindFramebuffer(gl.FRAMEBUFFER,dye.write.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(addDyeProg);
  bindTex(addDyeProg,'uDye',0,dye.read.tex);
  gl.uniform2f(addDyeU.uPoint,px,py);
  gl.uniform1f(addDyeU.uRadius,radius);
  gl.uniform4f(addDyeU.uColor,r,g,b,a);
  drawQuad(addDyeProg);
  swapFBO(dye);
}

function stepAdvect(target,source,dissipation,dt){
  gl.bindFramebuffer(gl.FRAMEBUFFER,target.write.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(advectProg);
  bindTex(advectProg,'uVel',0,velocity.read.tex);
  bindTex(advectProg,'uSource',1,source.read.tex);
  gl.uniform1f(advectU.uDt,dt);
  gl.uniform1f(advectU.uDissipation,dissipation);
  gl.uniform2fv(advectU.uTexel,texel);
  drawQuad(advectProg);
  swapFBO(target);
}

function stepDivergence(){
  gl.bindFramebuffer(gl.FRAMEBUFFER,divFBO.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(divProg);
  bindTex(divProg,'uVel',0,velocity.read.tex);
  gl.uniform2fv(divU.uTexel,texel);
  drawQuad(divProg);
}

function stepPressure(){
  gl.useProgram(pressureProg);
  gl.uniform2fv(pressureU.uTexel,texel);
  for(var i=0;i<8;i++){
    gl.bindFramebuffer(gl.FRAMEBUFFER,pressure.write.fb);
    gl.viewport(0,0,SIM,SIM);
    bindTex(pressureProg,'uPressure',0,pressure.read.tex);
    bindTex(pressureProg,'uDiv',1,divFBO.tex);
    drawQuad(pressureProg);
    swapFBO(pressure);
  }
}

function stepGradient(){
  gl.bindFramebuffer(gl.FRAMEBUFFER,velocity.write.fb);
  gl.viewport(0,0,SIM,SIM);
  gl.useProgram(gradProg);
  bindTex(gradProg,'uVel',0,velocity.read.tex);
  bindTex(gradProg,'uPressure',1,pressure.read.tex);
  gl.uniform2fv(gradU.uTexel,texel);
  drawQuad(gradProg);
  swapFBO(velocity);
}

function stepRender(waterLevel){
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,cv.width,cv.height);
  gl.useProgram(renderProg);
  bindTex(renderProg,'uDye',0,dye.read.tex);
  bindTex(renderProg,'uVel',1,velocity.read.tex);
  gl.uniform2fv(renderU.uTexel,texel);
  gl.uniform1f(renderU.uWaterLevel,waterLevel);
  drawQuad(renderProg);
}

/* === Falling Blobs === */
var blobs=[];
var spawnTimer=0,spawnInterval=1.2;

function spawnBlob(){
  blobs.push({
    x:0.1+rng()*0.8,
    y:1.05,
    vx:(rng()-0.5)*0.1,
    vy:-(0.3+rng()*0.4),
    r:0.02+rng()*0.03,
    alive:true
  });
}

/* === Main Loop === */
var lastTime=performance.now();
var waterBonus=Number(sessionStorage.getItem('m1Bonus'))||0;

function tick(now){
  var dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  // Compute water level
  var cl=sessionStorage.getItem('m1Cleared'),lv;
  if(cl){var ct=(Date.now()-Number(cl))/1000;var clLv=Number(sessionStorage.getItem('m1ClearedLv'))||1;lv=Math.max(clLv*(1-ct/3),0);}
  else{var el=(Date.now()-Number(sessionStorage.getItem('m1Start')))/1000;lv=Math.min(el/D,1);}
  var totalLv=Math.min(lv+waterBonus,1);

  // Spawn blobs
  spawnInterval=Math.max(0.5,1.2-lv*0.6);
  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval&&blobs.length<15){spawnBlob();spawnTimer=0;}

  // Inject gentle turbulence along water surface
  var surfX=0.1+Math.sin(now*0.0007)*0.3+0.3;
  stepAddForce(surfX,totalLv,(Math.sin(now*0.002))*0.3,0.1,0.08);

  // Update and apply blob forces
  for(var i=blobs.length-1;i>=0;i--){
    var b=blobs[i];if(!b.alive)continue;
    b.vy-=0.8*dt; // gravity (downward in UV space)
    b.x+=b.vx*dt;
    b.y+=b.vy*dt;

    // Apply force at blob position
    if(b.y>0&&b.y<1&&b.x>0&&b.x<1){
      stepAddForce(b.x,b.y,b.vx*2,b.vy*2,b.r);
      stepAddDye(b.x,b.y,b.r,0.8,0,0,0);
    }

    // Check if blob hit water surface
    if(b.y<=totalLv+0.02){
      waterBonus+=0.001;
      sessionStorage.setItem('m1Bonus',waterBonus);
      b.alive=false;
    }
    // Off screen
    if(b.y<-0.1||b.x<-0.1||b.x>1.1)b.alive=false;
  }
  blobs=blobs.filter(function(b){return b.alive;});

  // Fluid simulation steps
  stepAdvect(velocity,velocity,0.998,dt);
  stepDivergence();
  stepPressure();
  stepGradient();
  stepAdvect(dye,dye,0.995,dt);

  // Render
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  stepRender(totalLv);
  gl.disable(gl.BLEND);

  requestAnimationFrame(tick);
}
var cleared=false;
document.getElementById('clearBtn').addEventListener('click',function(){if(cleared)return;cleared=true;
var el=(Date.now()-Number(sessionStorage.getItem('m1Start')))/1000;
var lvNow=Math.min(el/D,1)+waterBonus;lvNow=Math.min(lvNow,1);
sessionStorage.setItem('m1Cleared',Date.now());
sessionStorage.setItem('m1ClearedLv',lvNow);
document.getElementById('cm').style.display='block';
window.parent.postMessage({type:'PAGE_ARRIVED',panelId:1},'*');});
requestAnimationFrame(tick);
</script></body></html>
