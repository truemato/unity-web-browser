<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel 2</title>
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;
  background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);color:#fff;font-family:sans-serif}
.container{text-align:center}
h1{font-size:2.5em;margin-bottom:.3em}
p{font-size:1.2em;opacity:.8;margin-bottom:1em}
.btn{display:inline-block;margin:.3em;padding:14px 28px;border-radius:8px;font-size:1.1em;
  border:none;cursor:pointer;font-weight:bold;background:#fff;color:#4facfe}
.btn:hover{opacity:.85}
input[type=text]{padding:10px;border:none;border-radius:8px;font-size:1em;width:200px;text-align:center}
#log{font-size:1em;margin-top:.8em;max-height:150px;overflow-y:auto;text-align:left;padding:0 1em}
.log-entry{opacity:.9;margin:.2em 0}
</style>
</head>
<body>
<div class="container">
  <h1>Panel 2</h1>
  <p>Third monitor</p>
  <input type="text" id="nameInput" placeholder="Type your name"><br><br>
  <button class="btn" onclick="greet()">Say Hello</button>
  <button class="btn" onclick="addTimestamp()">Timestamp</button>
  <div id="log"></div>
</div>
<script>
function greet(){var n=document.getElementById('nameInput').value||'World';addLog('Hello, '+n+'!');}
function addTimestamp(){addLog('Time: '+new Date().toLocaleTimeString());}
function addLog(m){var e=document.createElement('p');e.className='log-entry';e.textContent=m;document.getElementById('log').prepend(e);}
</script>
</body>
</html>
