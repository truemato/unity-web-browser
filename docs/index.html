<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel 0</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; font-family:sans-serif; }
    .container { text-align:center; }
    h1 { font-size:2.5em; margin-bottom:0.3em; }
    p { font-size:1.2em; opacity:0.8; margin-bottom:1em; }
    .btn { display:inline-block; margin:0.3em; padding:14px 28px; background:white; color:#764ba2; text-decoration:none; border-radius:8px; font-size:1.1em; border:none; cursor:pointer; font-weight:bold; }
    .btn:hover { opacity:0.85; }
    .btn-goal { background:#38ef7d; color:#11998e; }
    #counter { font-size:1.5em; margin-top:0.8em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Panel 0</h1>
    <p>First monitor</p>
    <button class="btn" onclick="count++; document.getElementById('counter').textContent='Clicks: '+count">Click Me!</button>
    <a class="btn btn-goal" href="goal.html">Go to Goal</a>
    <div id="counter">Clicks: 0</div>
  </div>
  <script>var count = 0;</script>
</body>
</html>
